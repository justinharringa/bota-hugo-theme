baseURL: https://example.com
languageCode: en-us
title: Bota Theme Example
theme: bota

permalinks:
  posts: posts/:year/:month/:title/

taxonomies:
  category: categories
  tag: tags

# Fake values — exampleSite exists only to exercise templates in CI, not
# to ship analytics or real Disqus.
services:
  googleAnalytics:
    ID: "G-TESTXXXXXX"

disqusShortname: "bota-theme-example"

params:
  author: Example Author
  SiteDescription: Example site used by CI to exercise the bota theme's templates.
  blogPostTaxonomy: posts

menu:
  main:
  - name: Blog Posts
    url: /posts/
    weight: -100
  - name: About
    url: /about/
    weight: -80

markup:
  goldmark:
    renderer:
      unsafe: true
